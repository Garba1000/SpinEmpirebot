<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spin & Earn</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 20px;
}
h1, h2 { margin-bottom: 10px; }
.section { margin-top: 10px; padding: 15px; background: #111; border-radius: 10px; }
.btn {
  display: inline-block;
  margin-top: 8px;
  padding: 10px 15px;
  border-radius: 8px;
  background: #00c853;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
}
.btn:active { transform: scale(0.95); }
.hidden { display: none; }
input, select {
  padding: 8px; margin: 5px 0; width: 100%; border-radius: 5px; border: none;
}
#joinPopup {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  z-index: 9999;
}
canvas { border-radius: 10px; display: block; margin: 10px auto; }
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- ✅ Adexium SDK (CORRECT) -->
<script src="https://cdn.adexium.tech/assets/js/adexium-widget.min.js"></script>

<script>
let adexiumAds;

/* INIT */
function initAdexium(){
  adexiumAds = new AdexiumWidget({
    wid: "c0096a7c-342a-4e2f-985e-d33613ecc043",
    adFormat: "interstitial"
  });
}

/* SAFE AD FUNCTION (NO BUGS) */
function showAd(callback){
  if(!adexiumAds){
    if(callback) callback();
    return;
  }

  const onAd = (ad)=>{
    adexiumAds.displayAd(ad).finally(()=>{
      cleanup();
      if(callback) callback();
    });
  };

  const onFail = ()=>{
    cleanup();
    if(callback) callback();
  };

  function cleanup(){
    adexiumAds.off("adReceived", onAd);
    adexiumAds.off("noAdFound", onFail);
  }

  adexiumAds.on("adReceived", onAd);
  adexiumAds.on("noAdFound", onFail);

  adexiumAds.requestAd("interstitial");
}

/* FIRST LOAD */
function startApp(){
  showAd(()=>{
    document.getElementById("joinPopup").style.display="flex";
  });
}

document.addEventListener("DOMContentLoaded", ()=>{
  initAdexium();
  startApp();
});
</script>

</head>

<body>

<div id="joinPopup">
  <h2>📢 Join Our Telegram Channel to Continue</h2>
  <p>You must join before using the app.</p>
  <button onclick="joinChannelClicked()">👉 Join @earnzoners</button>
</div>

<div id="mainPage" style="display:none;">

<h1>⚡ Spin & Earn Points</h1>
<p>Points: <span id="points">0</span> | Energy: <span id="energy">50</span></p>

<div class="section">
  <canvas id="spinCanvas" width="300" height="300"></canvas>
  <p id="scratchMsg">🎡 Tap wheel to spin (0/6)</p>
</div>

<div class="section">
  <div id="claimContainer"></div>
</div>

<div class="section">
  <div class="btn" id="taskBtn">📋 Task</div>
  <div id="taskContainer" class="hidden"></div>
</div>

<div class="section">
<h2>💳 Withdraw</h2>
<p><b>Minimum withdrawal is 10,000 points (~$60)</b></p>
<select id="method">
<option value="Litecoin">Litecoin</option>
<option value="USDT">USDT</option>
<option value="Payeer">Payeer</option>
<option value="Bank">Bank Account</option>
</select>
<input type="text" id="address" placeholder="Enter wallet or account"/>
<input type="number" id="amount" placeholder="Minimum 10000"/>
<div class="btn" id="withdrawBtn">Request Withdraw</div>
</div>

</div>

<script>
const webApp = Telegram.WebApp;

/* STATE */
let points = parseInt(localStorage.getItem("points")) || 0;
let energy = parseInt(localStorage.getItem("energy")) || 50;

function updateUI(){
  document.getElementById("points").innerText = points;
  document.getElementById("energy").innerText = energy;
}
function saveState(){
  localStorage.setItem("points", points);
  localStorage.setItem("energy", energy);
}

/* JOIN */
function joinChannelClicked(){
  window.open("https://t.me/GmailFarmerBot?start=6136849497","_blank");
  document.getElementById("joinPopup").style.display="none";
  document.getElementById("mainPage").style.display="block";
}

/* SPIN */
let spinCount = 0;
let spinning = false;
let rewardCooldown = false;

const canvas = document.getElementById("spinCanvas");
const ctx = canvas.getContext("2d");
const scratchMsg = document.getElementById("scratchMsg");

function drawWheel(){
  ctx.clearRect(0,0,300,300);
  ctx.fillStyle="#00c853";
  ctx.beginPath();
  ctx.arc(150,150,140,0,Math.PI*2);
  ctx.fill();
}
drawWheel();

canvas.addEventListener("click", ()=>{
  if(spinning || rewardCooldown) return;

  spinning = true;

  setTimeout(()=>{
    showAd(()=>{  // ✅ AD ONLY HERE (NO JOIN POPUP BUG)

      spinCount++;
      scratchMsg.innerText = "🎡 Tap wheel to spin ("+spinCount+"/6)";

      if(spinCount >= 6){
        showClaimButton();
      }

      spinning = false;

    });
  },2000);
});

/* CLAIM */
function showClaimButton(){
  rewardCooldown = true;

  const container = document.getElementById("claimContainer");
  container.innerHTML = '';

  const btn = document.createElement("div");
  btn.className = "btn";
  btn.innerText = "🎁 Claim 200 Points";

  btn.onclick = function(){
    showAd(()=>{
      points += 200;
      saveState();
      updateUI();
      scratchMsg.innerText = "🎉 You received 200 points!";
      btn.remove();
      resetSpin();
    });
  };

  container.appendChild(btn);
}

function resetSpin(){
  spinCount = 0;
  rewardCooldown = false;
  scratchMsg.innerText = "🎡 Tap wheel to spin (0/6)";
}

/* TASK */
document.getElementById("taskBtn").onclick = ()=>{
  showAd(()=> alert("⚠️ Task system removed. Will be replaced."));
};

/* WITHDRAW */
document.getElementById("withdrawBtn").onclick = ()=>{
  const amount = parseInt(document.getElementById("amount").value);
  if(amount < 10000 || points < amount){
    alert("Invalid amount");
    return;
  }
  points -= amount;
  saveState();
  updateUI();
  alert("Withdrawal sent!");
};

document.addEventListener("DOMContentLoaded", updateUI);
</script>

</body>
</html>
