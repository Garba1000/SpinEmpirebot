<style>

body{
  background:
  radial-gradient(circle at top,#19b84d,#063517 70%);

  transform:scale(0.98);

      #ff4d6d 90deg 135deg,

</style>

<body>

<div class="header">

  <div class="logo">
    ⚡ Tap & Earn X
  </div>

  <div class="level">
    Level <span id="level">1</span>
  </div>

</div>

<div class="wallet-bar">

  <div class="wallet-card">
    <h3>⚡ Energy</h3>
    <p id="energy">0</p>
  </div>

  <div class="wallet-card">
    <h3>💰 PV</h3>
    <p id="points">0</p>
  </div>

  <div class="wallet-card">
    <h3>👥 Referrals</h3>
    <p id="refs">0</p>
  </div>

</div>

<div class="grid">

  <div class="card">
    <h3>🎡 Total Played</h3>
    <p id="taps">0</p>
  </div>

  <div class="card">
    <h3>🏆 Referral PV</h3>
    <p id="refEarn">0</p>
  </div>

</div>

<div class="section">

  <h2>🎡 Spin & Earn</h2>

  <div id="wheel">

    <div class="wheel-center">
      SPIN
    </div>

  </div>

  <div class="pointer"></div>

  <button class="btn" id="spinBtn">
    Spin (-10 Energy)
  </button>

</div>

<div class="section">

  <h2>📺 Reward Ad</h2>

  <button class="btn" id="rewardBtn">
    Watch Ad +10 Energy
  </button>

</div>

<div class="section">

  <h2>🎯 Task Center</h2>

  <button class="btn" id="taskBtn">
    Complete Task +10 Energy
  </button>

</div>

<div class="section">

  <h2>🎁 Daily Reward</h2>

  <button class="btn" id="dailyBtn">
    Claim +1000 Energy
  </button>

  <div id="dailyProgressBar">
    <div></div>
  </div>

</div>

<div class="section">

  <h2>👥 Referral</h2>

  <input id="refInput" readonly>

  <button class="btn" id="copyBtn">
    Copy Referral Link
  </button>

</div>

    id="wallet"
    placeholder="Wallet Address"
  >

    id="amount"
    type="number"
    placeholder="Amount"

  <button class="btn" id="withdrawBtn">
    Withdraw PV
  </button>

</div>

<!-- JOIN POPUP -->

<div id="joinPopup">

  <h2 style="margin-bottom:15px;">
    Join Our Channel
  </h2>

  <button id="joinBtn">
    Join Channel +5 Energy
  </button>

</div>

<script>

const tg = window.Telegram?.WebApp;

tg?.expand?.();

/* CONFIG */

const BOT_USERNAME = "@Reyersbot";

/* USER */

const user =
  tg?.initDataUnsafe?.user || {};

const uid =
  user?.id?.toString() || "guest";

/* STORAGE */

const STORAGE_KEY =
  "tapearnx_" + uid;

/* STATE */

let pv = 0;
let taps = 0;
let refs = 0;
let energy = 0;
let refEarn = 0;

let dailyClaim = 0;
let dailyProgress = 0;

const DAILY_BLOCKS = [
  "task-29806",
  "task-29807",
  "task-29808",
  "task-29809"
];

/* LOAD */

function loadData(){

  const saved =
    localStorage.getItem(STORAGE_KEY);

  if(saved){

    const d = JSON.parse(saved);

    pv = d.pv || 0;

    taps = d.taps || 0;

    refs = d.refs || 0;

    energy = d.energy || 0;

    refEarn = d.refEarn || 0;

    dailyClaim = d.dailyClaim || 0;

    dailyProgress = d.dailyProgress || 0;
  }

  updateUI();
}

loadData();

/* SAVE */

function saveData(){

  localStorage.setItem(

    STORAGE_KEY,

    JSON.stringify({

      pv,
      taps,
      refs,
      energy,
      refEarn,
      dailyClaim,
      dailyProgress

    })
  );
}

/* DAILY BAR */

function updateDailyBar(){

  const percent =
    (dailyProgress / 4) * 100;

  document.querySelector(
    "#dailyProgressBar div"
  ).style.width =
    percent + "%";
}

/* UI */

function updateUI(){

  document.getElementById("points")
  .innerText = pv;

  document.getElementById("energy")
  .innerText = energy;

  document.getElementById("taps")
  .innerText = taps;

  document.getElementById("refs")
  .innerText = refs;

  document.getElementById("refEarn")
  .innerText = refEarn;

  document.getElementById("level")
  .innerText =
    Math.floor(pv / 500) + 1;

  document.getElementById("refInput")
  .value =
  `https://t.me/${BOT_USERNAME}?start=${uid}`;

  updateDailyBar();
}

/* SPIN */

let spinning = false;
let wheelRotation = 0;

document.getElementById("spinBtn")
.onclick = ()=>{

  if(spinning)
  return;

  if(energy < 10){

    return alert(
      "Not enough energy"
    );
  }

  spinning = true;

  energy -= 10;

  saveData();

  updateUI();

  const rewards =
  [5,8,10,12,15,18,20,25,30];

  const reward =
    rewards[
      Math.floor(
        Math.random() *
        rewards.length
      )
    ];

  const extraRotation =
    1440 +
    Math.floor(
      Math.random() * 360
    );

  wheelRotation += extraRotation;

  const wheel =
    document.getElementById("wheel");

  wheel.style.transition =
    "transform 4s cubic-bezier(0.17,0.67,0.18,1)";

  wheel.style.transform =
    `rotate(${wheelRotation}deg)`;

  setTimeout(()=>{

    pv += reward;

    taps++;

    saveData();

    updateUI();

    alert(
      "🎉 You won " +
      reward +
      " PV"
    );

    spinning = false;

  },4000);
};

/* ADSGRAM */

let rewardAd;
let taskAd;

window.onload = ()=>{

  if(typeof Adsgram !== "undefined"){

    rewardAd =
      Adsgram.init({
        blockId:"34131"
      });

    taskAd =
      Adsgram.init({
        blockId:"34132"
      });

    /* PRELOAD AD */

    let joinAd =
      Adsgram.init({
        blockId:"34132"
      });

    joinAd.show().finally(()=>{

      document.getElementById(
        "joinPopup"
      ).style.display = "flex";

    });
  }
};

/* WATCH AD */

document.getElementById("rewardBtn")
.onclick = async ()=>{

  if(!rewardAd)
  return;

  const r =
    await rewardAd.show();

  if(r?.done){

    energy += 10;

    saveData();

    updateUI();

    alert(
      "+10 Energy"
    );
  }
};

/* TASK */

document.getElementById("taskBtn")
.onclick = async ()=>{

  if(!taskAd)
  return;

  const r =
    await taskAd.show();

  if(r?.done){

    energy += 10;

    saveData();

    updateUI();

    alert(
      "+10 Energy"
    );
  }
};

/* DAILY */

document.getElementById("dailyBtn")
.onclick = async ()=>{

  const now = Date.now();

  if(
    now - dailyClaim <
    86400000
  ){
    return alert(
      "Come back tomorrow"
    );
  }

  if(typeof Adsgram === "undefined"){
    return alert(
      "Ads not ready"
    );
  }

  dailyProgress = 0;

  saveData();

  updateUI();

  function startTask(index){

    if(index >= 4){

      energy += 1000;

      dailyClaim = now;

      dailyProgress = 0;

      saveData();

      updateUI();

      return alert(
        "🎉 Daily bonus completed! +1000 Energy"
      );
    }

    let task =
      document.createElement(
        "adsgram-task"
      );

    task.setAttribute(
      "data-block-id",
      DAILY_BLOCKS[index]
    );

    document.getElementById(
      "dailyBtn"
    ).parentNode.appendChild(task);

    task.addEventListener(
      "reward",
      ()=>{

        dailyProgress++;

        saveData();

        updateUI();

        task.remove();

        alert(
          "Task " +
          dailyProgress +
          "/4 completed"
        );

        startTask(index + 1);
      }
    );

    if(typeof task.load === "function"){
      task.load();
    }
  }

  startTask(0);
};

/* JOIN CHANNEL */

document.getElementById(
  "joinBtn"
).onclick = ()=>{

  energy += 5;

  saveData();

  updateUI();

  document.getElementById(
    "joinPopup"
  ).style.display = "none";

  window.open(
    "https://t.me/CashGyana",
    "_blank"
  );
};

/* COPY */

document.getElementById("copyBtn")
.onclick = ()=>{

  navigator.clipboard.writeText(

    document.getElementById(
      "refInput"
    ).value

  );

  alert(
    "Referral link copied"
  );
};

/* WITHDRAW */

document.getElementById(
  "withdrawBtn"
).onclick = ()=>{

  let amount =
    parseInt(
      document.getElementById(
        "amount"
      ).value
    );

  let wallet =
    document.getElementById(
      "wallet"
    ).value;

  if(!amount || amount <= 0)
    return alert(
      "Enter valid amount"
    );

  if(amount < 10000)
    return alert(
      "Minimum 10,000 PV"
    );

  if(amount > pv)
    return alert(
      "Insufficient PV"
    );

  if(!wallet)
    return alert(
      "Enter wallet"
    );

  pv -= amount;

  saveData();

  updateUI();

  alert(
    "Withdrawal request submitted"
  );
};

</script>

</body>
</html>
