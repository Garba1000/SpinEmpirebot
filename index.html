<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spin & Earn</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  margin: 0;
  padding: 20px;
}
h1, h2 { margin-bottom: 10px; }
.section { margin-top: 20px; padding: 15px; background: #111; border-radius: 10px; }
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 8px;
  background: #00c853;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
}
.btn:active { transform: scale(0.95); }
.hidden { display: none; }
input, select {
  padding: 8px; margin: 5px 0; width: 100%; border-radius: 5px; border: none;
}
canvas { border-radius: 10px; display: block; margin: 10px auto; }
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>

<body>

<h1>⚡ Spin & Earn Points</h1>
<p>Points: <span id="points">0</span></p>

<div class="section">
  <canvas id="spinCanvas" width="300" height="300"></canvas>
  <p id="spinMsg">🎡 Tap wheel to spin (0/6)</p>
</div>

<div id="adsgram-container" class="hidden"></div>

<script>
const webApp = Telegram.WebApp;

let points = parseInt(localStorage.getItem("points") || "0");
function saveState(){ localStorage.setItem("points", points); }
function updateUI(){ document.getElementById("points").innerText = points; }
updateUI();

/* ================= SPIN SYSTEM ================= */

const rewardBlocks = ["23731","23732","23734"];
const spinTaskBlocks = ["task-23767","task-23768","task-23774","task-23775"];

let spinCount = 0;
let spinning = false;

const canvas = document.getElementById("spinCanvas");
const ctx = canvas.getContext("2d");
const spinMsg = document.getElementById("spinMsg");
const container = document.getElementById("adsgram-container");

let currentRotation = 0;
const spinSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3");

/* DRAW WHEEL */
function drawWheel(rotation = 0){
  const segments = 6;
  const angle = (2 * Math.PI) / segments;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(150,150);
  ctx.rotate(rotation);

  for(let i=0;i<segments;i++){
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,140,i*angle,(i+1)*angle);
    ctx.fillStyle = i % 2 === 0 ? "#00c853" : "#222";
    ctx.fill();
    ctx.stroke();
  }

  ctx.restore();

  ctx.beginPath();
  ctx.moveTo(150,10);
  ctx.lineTo(140,40);
  ctx.lineTo(160,40);
  ctx.fillStyle="#fff";
  ctx.fill();
}
drawWheel();

/* SPIN CLICK */
canvas.addEventListener("click", ()=>{
  if(spinning) return;

  spinning = true;
  spinSound.play();

  let spinDuration = 2500;
  let spinAngle = Math.random() * 360 + 1080;
  let start = null;

  function animateSpin(timestamp){
    if(!start) start = timestamp;
    let progress = timestamp - start;

    if(progress < spinDuration){
      let easeOut = 1 - Math.pow(1 - progress/spinDuration,3);
      currentRotation = (spinAngle * easeOut) * Math.PI/180;
      drawWheel(currentRotation);
      requestAnimationFrame(animateSpin);
    }else{
      spinning = false;
      showSpinAd();
    }
  }
  requestAnimationFrame(animateSpin);
});

/* SHOW AD AFTER EACH SPIN */
function showSpinAd(){
  try{
    const randomBlock = rewardBlocks[Math.floor(Math.random()*rewardBlocks.length)];
    const rewardAd = window.Adsgram.init({blockId: randomBlock});
    rewardAd.show().finally(()=>{
      spinCount++;
      spinMsg.innerText = "🎡 Tap wheel to spin (" + spinCount + "/6)";
      if(spinCount >= 6){
        showClaimButton();
      }
    });
  }catch(e){
    spinCount++;
    if(spinCount >= 6){
      showClaimButton();
    }
  }
}

/* SHOW CLAIM BUTTON */
function showClaimButton(){
  spinMsg.innerHTML = `
    🎁 You completed 6 spins!<br><br>
    <div class="btn" id="claimBtn">Claim 200 Points</div>
  `;

  document.getElementById("claimBtn").addEventListener("click", showClaimTask);
}

/* SHOW CLAIM TASK */
function showClaimTask(){
  const randomTask = spinTaskBlocks[Math.floor(Math.random()*spinTaskBlocks.length)];

  container.innerHTML = `<adsgram-task class="spin-claim-task" data-block-id="${randomTask}"></adsgram-task>`;
  container.classList.remove("hidden");

  const task = container.querySelector(".spin-claim-task");

  task.addEventListener("reward", ()=>{
    points += 200;
    saveState();
    updateUI();

    container.classList.add("hidden");

    spinMsg.innerHTML = `
      🎉 You're successfully received 200 points from Spin & Earn<br><br>
      🔄 Resetting in 30 seconds...
    `;

    setTimeout(resetSpinSystem, 30000); // 30 seconds
  });
}

/* RESET SYSTEM */
function resetSpinSystem(){
  spinCount = 0;
  currentRotation = 0;
  drawWheel();
  spinMsg.innerText = "🎡 Tap wheel to spin (0/6)";
}

/* INIT */
updateUI();
</script>

</body>
</html>
