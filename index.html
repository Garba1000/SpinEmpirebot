<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tap & Earn X</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
  radial-gradient(circle at top,#19b84d,#063517 70%);
  color:white;
  font-family:Arial,sans-serif;
  padding:15px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  font-size:26px;
  font-weight:bold;
}

.level{
  background:#0e5226;
  padding:10px 16px;
  border-radius:20px;
}

.wallet-bar{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:18px;
}

.wallet-card{
  flex:1;
  background:#0f4422;
  padding:16px;
  border-radius:18px;
  text-align:center;
}

.wallet-card h3{
  font-size:14px;
  margin-bottom:6px;
}

.wallet-card p{
  font-size:22px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:18px;
}

.card{
  background:#0d3c1d;
  padding:18px;
  border-radius:20px;
}

.card h3{
  margin-bottom:10px;
}

.section{
  background:#0d3c1d;
  padding:18px;
  border-radius:22px;
  margin-bottom:18px;
}

.btn{
  width:100%;
  border:none;
  padding:14px;
  border-radius:16px;
  margin-top:14px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(45deg,#25ff74,#00c853);
  color:#000;
  font-size:15px;
}

.btn:active{
  transform:scale(0.98);
}

input,select{
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  background:#184d2a;
  color:white;
  margin-top:12px;
}

#dailyProgressBar{
  width:100%;
  height:8px;
  background:#1f5e35;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}

#dailyProgressBar div{
  width:0%;
  height:100%;
  background:#fff;
}

#wheel{
  width:270px;
  height:270px;
  border-radius:50%;
  margin:20px auto;
  position:relative;
  border:10px solid #111;
  background:
    conic-gradient(
      #ffcc00 0deg 45deg,
      #00e0ff 45deg 90deg,
      #ff4d6d 90deg 135deg,
      #00c853 135deg 180deg,
      #ff9100 180deg 225deg,
      #aa00ff 225deg 270deg,
      #00b0ff 270deg 315deg,
      #ff1744 315deg 360deg
    );
}

.wheel-center{
  position:absolute;
  width:80px;
  height:80px;
  background:#111;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  border:5px solid #fff;
}

.pointer{
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-top:30px solid white;
  margin:auto;
  margin-top:-10px;
}

</style>
</head>

<body>

<div class="header">

  <div class="logo">
    ⚡ Tap & Earn X
  </div>

  <div class="level">
    Level <span id="level">1</span>
  </div>

</div>

<div class="wallet-bar">

  <div class="wallet-card">
    <h3>⚡ Energy</h3>
    <p id="energy">0</p>
  </div>

  <div class="wallet-card">
    <h3>💰 PV</h3>
    <p id="points">0</p>
  </div>

  <div class="wallet-card">
    <h3>👥 Referrals</h3>
    <p id="refs">0</p>
  </div>

</div>

<div class="grid">

  <div class="card">
    <h3>🎡 Total Played</h3>
    <p id="taps">0</p>
  </div>

  <div class="card">
    <h3>🏆 Referral PV</h3>
    <p id="refEarn">0</p>
  </div>

</div>

<div class="section">

  <h2>🎡 Spin & Earn</h2>

  <div id="wheel">

    <div class="wheel-center">
      SPIN
    </div>

  </div>

  <div class="pointer"></div>

  <button class="btn" id="spinBtn">
    Spin (-10 Energy)
  </button>

</div>

<div class="section">

  <h2>📺 Reward Ad</h2>

  <button class="btn" id="rewardBtn">
    Watch Ad +100 Energy
  </button>

</div>

<div class="section">

  <h2>🎯 Task Center</h2>

  <button class="btn" id="taskBtn">
    Complete Task +100 Energy
  </button>

</div>

<div class="section">

  <h2>🎁 Daily Reward</h2>

  <button class="btn" id="dailyBtn">
    Claim +1000 Energy
  </button>

  <div id="dailyProgressBar">
    <div></div>
  </div>

</div>

<div class="section">

  <h2>👥 Referral</h2>

  <input id="refInput" readonly>

  <button class="btn" id="copyBtn">
    Copy Referral Link
  </button>

</div>

<div class="section">

  <h2>💳 Withdraw</h2>

  <select id="method">
    <option>USDT</option>
    <option>Litecoin</option>
    <option>Payeer</option>
    <option>Bank</option>
  </select>

  <input
    id="wallet"
    placeholder="Wallet Address"
  >

  <input
    id="amount"
    type="number"
    placeholder="Amount"
  >

  <button class="btn" id="withdrawBtn">
    Withdraw PV
  </button>

</div>

<script type="module">

const tg = window.Telegram?.WebApp;
tg?.expand?.();

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  get,
  update
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const app = initializeApp({

  apiKey:
  "AIzaSyC2dCYo4mgndxzFNSlcwGr1V7Ypp6VC0Cw",

  authDomain:
  "urser-a8a29.firebaseapp.com",

  databaseURL:
  "https://urser-a8a29-default-rtdb.firebaseio.com",

  projectId:
  "urser-a8a29",

});

const db = getDatabase(app);

/* CONFIG */

const BOT_USERNAME = "Profitvablebot";

/* STATE */

let user = null;
let uid = null;

let pv = 0;
let taps = 0;
let refs = 0;

let energy = 0;

let dailyProgress = 0;
let lastDaily = 0;

let refBy = null;
let refEarn = 0;

function userRef(){
  return ref(db,"users/"+uid);
}

/* INIT USER */

async function initUser(){

  user =
    tg?.initDataUnsafe?.user || {};

  const urlParams =
    new URLSearchParams(window.location.search);

  uid =
    urlParams.get("uid") ||
    user?.id?.toString();

  if(!uid){
    alert("User not found");
    return;
  }

  await loadUser();
}

initUser();

/* START PARAM */

function getStartParam(){

  const urlParams =
    new URLSearchParams(window.location.search);

  return (
    urlParams.get("start") ||
    urlParams.get("ref")
  );
}

/* LOAD USER */

async function loadUser(){

  const snap =
    await get(userRef());

  if(!snap.exists()){

    refBy = getStartParam();

    await set(userRef(),{

      pv:0,
      taps:0,

      referrals:0,
      ref_earnings:0,

      energy:0,

      dailyProgress:0,
      lastDaily:0,

      referred_by:refBy,

      username:
      user?.username || "",

      first_name:
      user?.first_name || "",

      telegram_id:uid

    });

    if(refBy && refBy !== uid){

      const r =
        ref(db,"users/"+refBy);

      const rs =
        await get(r);

      if(rs.exists()){

        update(r,{
          referrals:
          (rs.val().referrals || 0) + 1
        });

      }
    }
  }

  const d =
    (await get(userRef())).val();

  pv = d.pv || 0;

  taps = d.taps || 0;

  refs =
    Number(d.referrals || 0);

  energy =
    d.energy || 0;

  dailyProgress =
    d.dailyProgress || 0;

  lastDaily =
    d.lastDaily || 0;

  refEarn =
    d.ref_earnings || 0;

  refBy =
    d.referred_by || null;

  setReferralLink();

  updateUI();
}

/* SAVE */

async function save(){

  await update(userRef(),{

    pv,
    taps,

    energy,

    dailyProgress,
    lastDaily,

    ref_earnings:
    refEarn,

    updated_at:
    Date.now()

  });
}

/* REF BONUS */

async function giveRefBonus(amount){

  if(!refBy || refBy === uid)
  return;

  const bonus =
    Math.floor(amount * 0.05);

  if(bonus <= 0)
  return;

  const r =
    ref(db,"users/"+refBy);

  const rs =
    await get(r);

  if(rs.exists()){

    const oldPv =
      rs.val().pv || 0;

    const oldEarn =
      rs.val().ref_earnings || 0;

    await update(r,{

      pv:
      oldPv + bonus,

      ref_earnings:
      oldEarn + bonus

    });
  }
}

/* UI */

function updateUI(){

  document.getElementById("points")
  .innerText = pv;

  document.getElementById("energy")
  .innerText = energy;

  document.getElementById("taps")
  .innerText = taps;

  document.getElementById("refs")
  .innerText = refs;

  document.getElementById("refEarn")
  .innerText = refEarn;

  document.getElementById("level")
  .innerText =
    Math.floor(pv / 500) + 1;

  document.querySelector(
    "#dailyProgressBar div"
  ).style.width =
    (dailyProgress / 4) * 100 + "%";
}

/* REF LINK */

function setReferralLink(){

  document.getElementById("refInput")
  .value =
  `https://t.me/${BOT_USERNAME}?start=${uid}`;
}

/* SPIN SYSTEM */

let spinning = false;
let wheelRotation = 0;

document.getElementById("spinBtn")
.onclick = async ()=>{

  if(spinning)
  return;

  if(energy < 10){

    return alert(
      "Not enough energy"
    );
  }

  spinning = true;

  energy -= 10;

  const rewards =
  [5,8,10,12,15,18,20,25,30];

  const reward =
    rewards[
      Math.floor(
        Math.random() *
        rewards.length
      )
    ];

  const extraRotation =
    1440 +
    Math.floor(
      Math.random() * 360
    );

  wheelRotation += extraRotation;

  const wheel =
    document.getElementById("wheel");

  wheel.style.transition =
    "transform 4s cubic-bezier(0.17,0.67,0.18,1)";

  wheel.style.transform =
    `rotate(${wheelRotation}deg)`;

  setTimeout(async ()=>{

    pv += reward;

    taps++;

    await giveRefBonus(reward);

    await save();

    updateUI();

    alert(
      "🎉 You won " +
      reward +
      " PV"
    );

    spinning = false;

  },4000);
};

/* ADSGRAM */

let rewardAd;
let taskAd;

window.onload = ()=>{

  if(typeof Adsgram !== "undefined"){

    rewardAd =
      Adsgram.init({
        blockId:"29779"
      });

    taskAd =
      Adsgram.init({
        blockId:"29780"
      });
  }
};

/* REWARD AD */

document.getElementById("rewardBtn")
.onclick = async ()=>{

  const r =
    await rewardAd.show();

  if(r?.done){

    energy += 100;

    await save();

    updateUI();
  }
};

/* TASK */

document.getElementById("taskBtn")
.onclick = async ()=>{

  const r =
    await taskAd.show();

  if(r?.done){

    energy += 100;

    await save();

    updateUI();
  }
};

/* DAILY */

const blocks = [
  "task-29806",
  "task-29807",
  "task-29808",
  "task-29809"
];

document.getElementById("dailyBtn")
.onclick = async ()=>{

  let now = Date.now();

  if(
    now - lastDaily < 86400000
  ){
    return alert(
      "Come back tomorrow"
    );
  }

  energy += 1000;

  dailyProgress = 4;

  lastDaily = now;

  await save();

  updateUI();

  alert(
    "+1000 Energy Added"
  );
};

/* COPY */

document.getElementById("copyBtn")
.onclick = ()=>{

  navigator.clipboard.writeText(

    document.getElementById(
      "refInput"
    ).value

  );

  alert(
    "Referral link copied"
  );
};

/* WITHDRAW */

document.getElementById(
  "withdrawBtn"
).onclick = async ()=>{

  let amount =
    parseInt(
      document.getElementById(
        "amount"
      ).value
    );

  let wallet =
    document.getElementById(
      "wallet"
    ).value;

  let method =
    document.getElementById(
      "method"
    ).value;

  if(!amount || amount <= 0)
    return alert(
      "Enter valid amount"
    );

  if(amount < 10000)
    return alert(
      "Minimum 10,000 PV"
    );

  if(amount > pv)
    return alert(
      "Insufficient PV"
    );

  if(!wallet)
    return alert(
      "Enter wallet"
    );

  pv -= amount;

  await save();

  updateUI();

  alert(
    "Withdrawal request submitted"
  );

  console.log({
    uid,
    amount,
    wallet,
    method
  });
};

</script>

</body>
</html>
